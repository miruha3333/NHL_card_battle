<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>NHL Card Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-primary: #0C1D32;
            --bg-secondary: #14273E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0C4DE;
            --accent: #FF4B00;
            --accent-hover: #E04300;
            --card-bg: #1A3350;
            --button-bg: #FF4B00;
            --button-text: #FFFFFF;
            --rarity-gold: #FFD700;
            --rarity-silver: #C0C0C0;
            --rarity-elite: #8A2BE2;
            --rarity-legend: #FF4500;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px;
            min-height: 100vh;
            transition: background 0.3s;
        }
        .screen { display: none; }
        .screen.active { display: block; }

        h1, h2 { font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
        .btn {
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-block;
            text-align: center;
            margin: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:active { background: var(--accent-hover); transform: scale(0.97); }
        .btn.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid #2A4A6A;
        }
        .card-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .card-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px 8px;
            width: 100px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-item:active { transform: scale(0.96); }
        .card-item img {
            width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: #2A4A6A;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .card-item .name { font-weight: 600; font-size: 12px; margin: 6px 0 2px; color: var(--text-primary); }
        .card-item .stats { font-size: 11px; color: var(--text-secondary); }
        .rarity-badge {
            position: absolute; top: 4px; right: 4px;
            width: 16px; height: 16px; border-radius: 50%; font-size: 10px; line-height: 16px; color: black; font-weight: bold;
            background: var(--rarity-gold);
        }
        .team-preview {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 10px;
            margin: 12px 0;
            font-size: 13px;
            border-left: 3px solid var(--accent);
        }
        .match-log {
            background: #0A0E14; color: #00FF41; font-family: 'Courier New', monospace;
            padding: 10px; border-radius: 8px; height: 180px; overflow-y: auto; margin: 12px 0;
            font-size: 12px; border: 1px solid #2A4A6A;
        }
        .streak-badge {
            background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-weight: bold; font-size: 13px;
        }
        .info-block {
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

<!-- Главный экран -->
<div id="mainScreen" class="screen active">
    <h1>🏒 NHL Card Battle</h1>
    <p id="greeting" style="font-size:18px; font-weight:500;">Привет, менеджер!</p>
    <div class="info-block">
        <div>🌟 Уровень: <strong id="userLevel">1</strong></div>
        <div>🏆 Побед: <strong id="winsCount">0</strong>/100</div>
        <div>🪙 Монеты: <strong id="coinsDisplay">0</strong></div>
        <div style="margin-top:6px;"><span id="streakDisplay" class="streak-badge">Дней подряд: 1</span></div>
    </div>
    <div class="team-preview" id="teamPreview">⚡️ Состав не выбран</div>
    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:14px;">
        <button class="btn" onclick="openBooster()">🎁 Бесплатный бустер</button>
        <button class="btn secondary" onclick="showScreen('collectionScreen')">📦 Коллекция</button>
        <button class="btn secondary" onclick="showScreen('teamScreen')">👥 Состав</button>
        <button class="btn" onclick="startMatch()">⚔️ В БОЙ (30с)</button>
    </div>
    <div id="dailyTimer" style="margin-top:14px; font-size:13px; color: var(--text-secondary);"></div>
</div>

<!-- Экран коллекции -->
<div id="collectionScreen" class="screen">
    <h2>📦 Твои карты</h2>
    <div id="collectionContainer" class="card-list"></div>
    <button class="btn" onclick="showScreen('mainScreen')">⬅ На главную</button>
</div>

<!-- Экран состава -->
<div id="teamScreen" class="screen">
    <h2>👥 Выбери состав</h2>
    <p style="font-size:14px; margin-bottom:8px;">3 нападающих · 2 защитника · 1 вратарь</p>
    <div id="rosterSelection" class="card-list" style="justify-content: flex-start;"></div>
    <div style="background:var(--bg-secondary); border-radius:10px; padding:10px; margin:12px 0;">
        <strong>Текущий состав:</strong>
        <div id="forwardsList">Нап: не выбраны</div>
        <div id="defenseList">Защ: не выбраны</div>
        <div id="goalieList">Вр: не выбран</div>
    </div>
    <button class="btn" onclick="showScreen('mainScreen')">⬅ На главную (состав сохранён)</button>
</div>

<!-- Экран матча -->
<div id="matchScreen" class="screen">
    <h2>⚔️ Матч против AI</h2>
    <div class="match-log" id="matchLog"></div>
    <div id="matchResult" style="font-weight:bold; margin:8px 0; font-size:16px;"></div>
    <button class="btn" id="finishMatchBtn" onclick="exitMatch()">✅ Вернуться</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ============ CloudStorage ============
const cloud = {
    getItem(key) {
        return new Promise((resolve) => {
            tg.CloudStorage.getItem(key, (err, val) => resolve(err ? null : val));
        });
    },
    setItem(key, value) {
        return new Promise((resolve) => {
            tg.CloudStorage.setItem(key, value, (err) => resolve(!err));
        });
    }
};

// ============ Заглушка фото (инициалы на тёмном фоне) ============
function generateFallbackImg(name) {
    let initials = name.split(' ').slice(0,2).map(w=>w.charAt(0)).join('');
    let canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    let ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1A3350';
    ctx.fillRect(0,0,64,64);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 24px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(initials, 32, 32);
    return canvas.toDataURL();
}

// ============ База карт ============
const cardPool = {
    common: [
        { name: "Баркли Гудроу", pos: "F", O: 58, D: 62, P: 70, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8479350.jpg" },
        { name: "Мэтт Мартин", pos: "F", O: 55, D: 60, P: 78, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8471742.jpg" },
        { name: "Люк Гленденинг", pos: "F", O: 54, D: 68, P: 65, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8475189.jpg" },
        { name: "Райан Ривз", pos: "F", O: 50, D: 58, P: 85, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8471815.jpg" },
        { name: "Дерек Форборт", pos: "D", O: 52, D: 72, P: 74, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8477428.jpg" },
        { name: "Джош Браун", pos: "D", O: 48, D: 65, P: 76, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8478463.jpg" },
        { name: "Кейси Десмит", pos: "G", O: 40, D: 68, P: 60, SV: 72, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8477463.jpg" }
    ],
    silver: [
        { name: "Брэндон Саад", pos: "F", O: 72, D: 65, P: 70, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8475283.jpg" },
        { name: "Джейк Дибраск", pos: "F", O: 74, D: 62, P: 68, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8478425.jpg" },
        { name: "Адам Ларссон", pos: "D", O: 60, D: 82, P: 78, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8476855.jpg" },
        { name: "Фредрик Андерсен", pos: "G", O: 45, D: 78, P: 72, SV: 82, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8475883.jpg" }
    ],
    gold: [
        { name: "Брэйден Пойнт", pos: "F", O: 88, D: 74, P: 70, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8478475.jpg" },
        { name: "Чарли Макэвой", pos: "D", O: 78, D: 88, P: 76, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8478431.jpg" },
        { name: "Юусе Сарос", pos: "G", O: 50, D: 85, P: 78, SV: 90, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8477424.jpg" }
    ],
    elite: [
        { name: "Александр Барков", pos: "F", O: 92, D: 88, P: 74, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8477493.jpg" },
        { name: "Виктор Хедман", pos: "D", O: 84, D: 94, P: 80, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8475167.jpg" },
        { name: "Андрей Василевский", pos: "G", O: 52, D: 92, P: 82, SV: 94, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8476882.jpg" }
    ],
    legendary: [
        { name: "Коннор Макдэвид", pos: "F", O: 99, D: 85, P: 78, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8478402.jpg" },
        { name: "Кейл Макар", pos: "D", O: 95, D: 92, P: 80, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8480069.jpg" },
        { name: "Игорь Шестеркин", pos: "G", O: 55, D: 90, P: 82, SV: 96, img: "https://cms.nhl.bamgrid.com/images/headshots/current/168x168/8478010.jpg" }
    ]
};

const poolAccess = {1: ['common'], 2: ['common','silver'], 3: ['common','silver','gold'], 4: ['common','silver','gold','elite'], 5: ['common','silver','gold','elite','legendary']};

// ============ Состояние игры ============
let userData = {
    level: 1,
    wins: 0,
    coins: 1000,
    cards: [],
    team: { forwards: [], defense: [], goalie: null },
    lastDaily: null,
    streak: 0
};

// ============ Загрузка/Сохранение ============
async function loadUserData() {
    let saved = await cloud.getItem('nhl_save');
    if (saved) {
        try {
            let parsed = JSON.parse(saved);
            Object.assign(userData, parsed);
        } catch(e) { resetData(); }
    } else {
        resetData();
        giveStarterCards();
        await saveUserData();
    }
    checkDailyReset();
}

async function saveUserData() {
    await cloud.setItem('nhl_save', JSON.stringify(userData));
}

function resetData() {
    userData.level = 1;
    userData.wins = 0;
    userData.coins = 1000;
    userData.cards = [];
    userData.team = { forwards: [], defense: [], goalie: null };
    userData.lastDaily = null;
    userData.streak = 0;
}

function giveStarterCards() {
    for(let i=0; i<10; i++) {
        let card = cardPool.common[Math.floor(Math.random() * cardPool.common.length)];
        userData.cards.push({...card, id: Date.now()+i, fallback: generateFallbackImg(card.name)});
    }
    let goalie = cardPool.common.filter(c=>c.pos==='G')[0];
    userData.cards.push({...goalie, id: Date.now()+100, fallback: generateFallbackImg(goalie.name)});
}

// ============ Ежедневный бонус ============
function checkDailyReset() {
    let today = new Date().toDateString();
    if (userData.lastDaily !== today) {
        if (userData.lastDaily) {
            let last = new Date(userData.lastDaily);
            let diff = (new Date() - last) / (1000*60*60*24);
            userData.streak = (diff >= 1 && diff < 2) ? userData.streak + 1 : 1;
        } else {
            userData.streak = 1;
        }
        userData.lastDaily = today;
        saveUserData();
    }
    updateUI();
}

// ============ Бустеры ============
function openBooster() {
    let today = new Date().toDateString();
    if (userData.lastDaily === today) {
        tg.showPopup({title:'⏳ Подожди', message:'Бесплатный бустер уже получен сегодня.'});
        return;
    }
    let availablePools = poolAccess[userData.level];
    let pool = availablePools[availablePools.length-1];
    if (userData.streak >= 7) {
        let nextLevel = userData.level + 1;
        if (nextLevel <= 5 && poolAccess[nextLevel]) {
            pool = poolAccess[nextLevel][poolAccess[nextLevel].length-1];
        }
    }
    let newCards = [];
    for (let i=0; i<3; i++) {
        let card = getRandomCardFromPool(pool);
        newCards.push({...card, id: Date.now()+i, fallback: generateFallbackImg(card.name)});
    }
    userData.cards.push(...newCards);
    userData.lastDaily = today;
    if (userData.streak >= 7) userData.streak = 0;
    saveUserData();
    updateUI();
    tg.showPopup({title:'🎁 Бустер открыт!', message: newCards.map(c=>c.name).join(', ')});
}

function getRandomCardFromPool(poolName) {
    let pool = cardPool[poolName];
    return pool[Math.floor(Math.random() * pool.length)];
}

// ============ Матч ============
async function startMatch() {
    let team = userData.team;
    if (team.forwards.length !== 3 || team.defense.length !== 2 || !team.goalie) {
        tg.showAlert('⚠️ Собери состав: 3 нападающих, 2 защитника, 1 вратарь.');
        return;
    }
    showScreen('matchScreen');
    let log = document.getElementById('matchLog');
    let resultDiv = document.getElementById('matchResult');
    log.innerHTML = '';
    resultDiv.innerHTML = '';

    let aiTeam = generateAITeam(userData.level);
    let userScore = 0, aiScore = 0;

    for (let period=1; period<=3; period++) {
        log.innerHTML += `<br><b>--- Период ${period} ---</b><br>`;
        let userW = 0, aiW = 0;
        for (let d=0; d<5; d++) {
            let uPlayer = team.forwards.concat(team.defense).sort(()=>Math.random()-0.5)[0];
            let aPlayer = aiTeam.forwards.concat(aiTeam.defense).sort(()=>Math.random()-0.5)[0];
            let uRoll = Math.floor(Math.random()*6)+1, aRoll = Math.floor(Math.random()*6)+1;
            if (uPlayer.O + uRoll > aPlayer.D + aRoll) {
                let shot = uPlayer.O + Math.floor(Math.random()*6)+1;
                let save = aiTeam.goalie.SV + Math.floor(Math.random()*6)+1;
                if (shot > save) { userW++; log.innerHTML += `🚨 ГОЛ! ${uPlayer.name} пробил ${aiTeam.goalie.name}.<br>`; }
                else { log.innerHTML += `🛑 Сейв ${aiTeam.goalie.name} после броска ${uPlayer.name}.<br>`; }
            } else if (aPlayer.O + aRoll > uPlayer.D + uRoll) {
                let shot = aPlayer.O + Math.floor(Math.random()*6)+1;
                let save = team.goalie.SV + Math.floor(Math.random()*6)+1;
                if (shot > save) { aiW++; log.innerHTML += `😞 Пропустили! ${aPlayer.name} забивает ${team.goalie.name}.<br>`; }
                else { log.innerHTML += `🧤 ${team.goalie.name} спас после ${aPlayer.name}.<br>`; }
            } else {
                log.innerHTML += `⚡ Борьба ${uPlayer.name} vs ${aPlayer.name}, без гола.<br>`;
            }
            await new Promise(r => setTimeout(r, 450));
        }
        if (userW > aiW) { userScore++; log.innerHTML += `✅ Период ${period} ваш!<br>`; }
        else if (aiW > userW) { aiScore++; log.innerHTML += `❌ Период ${period} за AI.<br>`; }
        else { log.innerHTML += `🤝 Ничья в периоде ${period}.<br>`; }
    }

    let coinsEarned = 0;
    if (userScore > aiScore) {
        coinsEarned = 200; userData.wins++;
        if (userData.wins >= userData.level * 100) userData.level++;
        resultDiv.innerHTML = `🏆 Победа ${userScore}:${aiScore}! +200 монет.`;
    } else if (userScore < aiScore) {
        coinsEarned = 80;
        resultDiv.innerHTML = `😔 Поражение ${userScore}:${aiScore}. +80 монет.`;
    } else {
        coinsEarned = 120;
        resultDiv.innerHTML = `🤝 Ничья ${userScore}:${aiScore}. +120 монет.`;
    }
    userData.coins += coinsEarned;
    saveUserData();
    updateUI();
}

function exitMatch() {
    showScreen('mainScreen');
    updateUI();
}

function generateAITeam(level) {
    let pools = poolAccess[level];
    let all = pools.flatMap(p => cardPool[p]);
    let f = all.filter(c=>c.pos==='F').sort(()=>Math.random()-0.5).slice(0,3);
    let d = all.filter(c=>c.pos==='D').sort(()=>Math.random()-0.5).slice(0,2);
    let g = all.filter(c=>c.pos==='G').sort(()=>Math.random()-0.5)[0];
    return { forwards: f, defense: d, goalie: g };
}

// ============ Состав (автосохранение) ============
function togglePlayer(card) {
    let t = userData.team;
    if (card.pos === 'F') {
        let idx = t.forwards.findIndex(c=>c.id===card.id);
        if (idx >= 0) t.forwards.splice(idx,1);
        else if (t.forwards.length < 3) t.forwards.push(card);
        else { tg.showAlert('Максимум 3 нападающих'); return; }
    } else if (card.pos === 'D') {
        let idx = t.defense.findIndex(c=>c.id===card.id);
        if (idx >= 0) t.defense.splice(idx,1);
        else if (t.defense.length < 2) t.defense.push(card);
        else { tg.showAlert('Максимум 2 защитника'); return; }
    } else if (card.pos === 'G') {
        t.goalie = (t.goalie && t.goalie.id === card.id) ? null : card;
    }
    displaySelectedTeam();
    saveUserData(); // автосохранение сразу после изменения
    updateTeamPreview();
}

function displaySelectedTeam() {
    let t = userData.team;
    document.getElementById('forwardsList').innerText = 'Нап: ' + (t.forwards.map(c=>c.name).join(', ') || '—');
    document.getElementById('defenseList').innerText = 'Защ: ' + (t.defense.map(c=>c.name).join(', ') || '—');
    document.getElementById('goalieList').innerText = 'Вр: ' + (t.goalie ? t.goalie.name : '—');
}

function updateTeamPreview() {
    let t = userData.team;
    let preview = document.getElementById('teamPreview');
    if (t.forwards.length === 3 && t.defense.length === 2 && t.goalie) {
        preview.innerHTML = `⚡ Состав: ${t.forwards[0].name}, ${t.forwards[1].name}, ${t.forwards[2].name} / ${t.defense[0].name}, ${t.defense[1].name} / 🥅 ${t.goalie.name}`;
    } else {
        preview.innerHTML = '⚠️ Состав неполный (нужно 3 нап., 2 защ., 1 вр.)';
    }
}

function renderTeamSelection() {
    let container = document.getElementById('rosterSelection');
    container.innerHTML = '';
    userData.cards.forEach(card => {
        let div = document.createElement('div');
        div.className = 'card-item';
        div.innerHTML = `<img src="${card.img}" onerror="this.onerror=null; this.src='${card.fallback || generateFallbackImg(card.name)}'"><div class="name">${card.name}</div><div class="stats">O:${card.O} D:${card.D} P:${card.P}</div>`;
        div.onclick = () => togglePlayer(card);
        container.appendChild(div);
    });
    displaySelectedTeam();
}

// ============ UI общее ============
function updateUI() {
    document.getElementById('userLevel').innerText = userData.level;
    document.getElementById('winsCount').innerText = userData.wins;
    document.getElementById('coinsDisplay').innerText = userData.coins;
    document.getElementById('streakDisplay').innerText = `🔥 Дней подряд: ${userData.streak}`;
    if (tg.initDataUnsafe?.user?.first_name) {
        document.getElementById('greeting').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
    }
    updateTeamPreview();

    let timerDiv = document.getElementById('dailyTimer');
    let today = new Date().toDateString();
    if (userData.lastDaily === today) {
        let now = new Date();
        let tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
        let msLeft = tomorrow - now;
        let h = Math.floor(msLeft/(1000*60*60));
        let m = Math.floor((msLeft%(1000*60*60))/(1000*60));
        timerDiv.innerHTML = `⏳ Бесплатный бустер через ${h}ч ${m}мин`;
    } else {
        timerDiv.innerHTML = '🎁 Бесплатный бустер доступен!';
    }

    let coll = document.getElementById('collectionContainer');
    if (coll) {
        coll.innerHTML = '';
        userData.cards.forEach(card => {
            let div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `<img src="${card.img}" onerror="this.onerror=null; this.src='${card.fallback || generateFallbackImg(card.name)}'"><div class="name">${card.name}</div><div class="stats">O:${card.O} D:${card.D} P:${card.P}</div>`;
            coll.appendChild(div);
        });
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'teamScreen') renderTeamSelection();
    if (id === 'mainScreen') updateUI();
}

// Старт
loadUserData().then(() => {
    updateUI();
    setInterval(updateUI, 60000);
});
</script>
